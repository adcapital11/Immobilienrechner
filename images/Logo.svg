<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Premium Gradient Matching the UI Tonalities -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Stylized modern house roof & calculation bars -->
  <g transform="translate(10, 10)" filter="url(#glow)">
    <!-- Roof -->
    <path d="M 40 10 L 75 40 L 65 40 L 40 18 L 15 40 L 5 40 Z" fill="url(#logo-grad)" />
    
    <!-- Chimney -->
    <rect x="55" y="18" width="8" height="15" fill="url(#logo-grad)" />

    <!-- Calculative pillars / building foundation -->
    <rect x="18" y="46" width="10" height="34" rx="3" fill="url(#logo-grad)" />
    <rect x="35" y="36" width="10" height="44" rx="3" fill="url(#logo-grad)" />
    <rect x="52" y="52" width="10" height="28" rx="3" fill="url(#logo-grad)" />

    <!-- Percentage sign/dot detail -->
    <circle cx="35" cy="18" r="3" fill="#ffffff" opacity="0.9" />
  </g>
</svg>
